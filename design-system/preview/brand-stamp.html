<!doctype html>
<html><head><meta charset="utf-8"><title>Stamp</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { display:flex; align-items:center; justify-content:center; padding: 20px; }
  .stamp { border: 1px solid #111; padding: 14px 20px 12px; max-width: 420px; }
  .inner { border: 0.5px solid #111; padding: 10px 14px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #111; }
  .wm { font-family: var(--font-display); font-weight: 600; font-size: 42px; letter-spacing: 0.18em; color: #111; margin: 6px 0 4px; line-height: 1; }
  .line { display: flex; justify-content: space-between; }
</style></head>
<body>
  <div class="stamp">
    <div class="inner">
      <div class="line"><span class="lbl">No. 0001</span><span class="lbl">Apr 2026</span></div>
      <div class="wm">CHARIOT</div>
      <div class="line"><span class="lbl">Accra → New York</span><span class="lbl">Duties paid</span></div>
    </div>
  </div>
</body></html>
