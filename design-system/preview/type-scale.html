<!doctype html>
<html><head><meta charset="utf-8"><title>Type · scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #5C5449; }
  .row { display: grid; grid-template-columns: 70px 1fr 120px; gap: 10px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #C8C0B5; }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #5C5449; }
  .smp { font-family: var(--font-display); color: #111; font-weight: 500; letter-spacing: -0.015em; line-height: 1.05; }
  .use { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #5C5449; text-align: right; }
</style></head>
<body>
  <div class="eyebrow">Display scale</div>
  <div style="margin-top:10px">
    <div class="row"><div class="tag">H1</div><div class="smp" style="font-size:44px">Already wearing it.</div><div class="use">Hero</div></div>
    <div class="row"><div class="tag">H2</div><div class="smp" style="font-size:32px">The community chose this.</div><div class="use">Section</div></div>
    <div class="row"><div class="tag">H3</div><div class="smp" style="font-size:24px">Drop 1 · 1Nri</div><div class="use">Drop title</div></div>
    <div class="row"><div class="tag">H4</div><div class="smp" style="font-size:20px">Dry Bones Tee, Coffee Brown</div><div class="use">Product</div></div>
    <div class="row"><div class="tag">Body</div><div class="smp" style="font-family:var(--font-body);font-size:18px;font-weight:400">Designed in Accra. Ships from New York.</div><div class="use">Paragraph</div></div>
  </div>
</body></html>
