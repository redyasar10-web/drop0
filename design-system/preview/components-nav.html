<!doctype html>
<html><head><meta charset="utf-8"><title>Nav header</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: #F2EBE0; }
  .nav {
    display: flex; align-items: center; justify-content: space-between; padding: 22px 28px;
    border-bottom: 1px solid #C8C0B5;
  }
  .wm { font-family: var(--font-display); font-weight: 600; font-size: 22px; letter-spacing: 0.18em; color: #111; }
  .links { display: flex; gap: 22px; }
  .links a { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: #111; text-decoration: none; }
  .links a:hover { opacity: 0.7; }
  .right { display: flex; gap: 18px; align-items: center; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #5C5449; padding: 14px 28px; }
</style></head>
<body>
  <div class="nav">
    <div class="wm">CHARIOT</div>
    <div class="links">
      <a>Shop</a><a>1Nri</a><a>Jireh</a><a>About</a><a>Drops</a>
    </div>
    <div class="right links"><a>Sign in</a><a>Bag (0)</a></div>
  </div>
  <div class="meta">Harmattan surface · Ash hairline when scrolled past hero</div>
</body></html>
