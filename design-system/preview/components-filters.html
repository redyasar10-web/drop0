<!doctype html>
<html><head><meta charset="utf-8"><title>Filter pills</title>
<link rel="stylesheet" href="_card.css">
<style>
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #5C5449; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .pill {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 8px 14px; border: 1px solid #C8C0B5; border-radius: 9999px; color: #111; background: transparent; cursor: pointer;
    transition: background 120ms cubic-bezier(.2,.6,.2,1), color 120ms, border-color 120ms;
  }
  .pill:hover { border-color: #111; }
  .pill.on { background: #111; color: #FAFAF8; border-color: #111; }
  .pill .x { margin-left: 8px; opacity: 0.7; }
</style></head>
<body>
  <div class="eyebrow">Filter pills — pill radius is the exception</div>
  <div class="row">
    <button class="pill on">All<span class="x">×</span></button>
    <button class="pill">1Nri</button>
    <button class="pill">Jireh</button>
    <button class="pill">Tops</button>
    <button class="pill">Outerwear</button>
    <button class="pill">Accessories</button>
    <button class="pill">Under $150</button>
    <button class="pill on">Ships now<span class="x">×</span></button>
  </div>
</body></html>
