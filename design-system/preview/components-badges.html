<!doctype html>
<html><head><meta charset="utf-8"><title>Badges & chips</title>
<link rel="stylesheet" href="_card.css">
<style>
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #5C5449; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
  .badge {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 6px 12px; border: 1px solid #111; border-radius: 9999px; color: #111; background: transparent;
  }
  .badge--gold   { background: #C9921E; color: #111; border-color: #C9921E; }
  .badge--urgent { background: transparent; color: #9B4523; border-color: #9B4523; }
  .badge--solid  { background: #111; color: #FAFAF8; border-color: #111; }
  .trust {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 6px 0; color: #111; border-top: 1px solid #C8C0B5; border-bottom: 1px solid #C8C0B5;
  }
  .trust-row { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 14px; }
</style></head>
<body>
  <div class="eyebrow">Drop & trust badges</div>
  <div class="row">
    <span class="badge badge--gold">Drop 1 · 1Nri</span>
    <span class="badge">Community voted</span>
    <span class="badge--urgent badge">3 left</span>
    <span class="badge badge--solid">Founding member</span>
    <span class="badge">Pre‑order</span>
  </div>
  <div class="trust-row">
    <span class="trust">Duties paid</span>
    <span class="trust">Ships from NYC</span>
    <span class="trust">Free returns · 14 days</span>
  </div>
</body></html>
