<!doctype html>
<html><head><meta charset="utf-8"><title>Voice</title>
<link rel="stylesheet" href="_card.css">
<style>
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #5C5449; }
  .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
  .col h4 { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; margin: 0 0 8px; color: #5C5449; }
  .col p { font-family: var(--font-body); font-size: 15px; line-height: 1.45; margin: 0; color: #111; }
  .bad { color: #9B4523; text-decoration: line-through; text-decoration-thickness: 1px; }
  .good { color: #111; }
</style></head>
<body>
  <div class="eyebrow">Voice — before / after</div>
  <div class="pair">
    <div class="col">
      <h4>✕ Cliché</h4>
      <p class="bad">We're celebrating the incredible designs of African fashion by bridging the gap. Discover stunning pieces today.</p>
    </div>
    <div class="col">
      <h4>✓ Chariot</h4>
      <p class="good">1Nri has been dressing Accra's creative class for six years. Their US debut is here. One drop. 14 days. No customs chaos.</p>
    </div>
  </div>
</body></html>
