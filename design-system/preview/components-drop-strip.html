<!doctype html>
<html><head><meta charset="utf-8"><title>Drop strip</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: #F2EBE0; }
  .strip {
    background: #111; color: #FAFAF8; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  }
  .strip .gold { color: #C9921E; }
  .strip .urg  { color: #9B4523; }
  .counter { font-variant-numeric: tabular-nums; }
  .under { padding: 18px 24px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #5C5449; }
</style></head>
<body>
  <div class="strip">
    <span><span class="gold">Drop 1 · 1Nri</span> — live now</span>
    <span class="counter">23 / 30 reserved</span>
    <span class="urg">Closes Fri 02:00 ET</span>
  </div>
  <div class="under">Fixed top · above nav · dismissible · Mono / Salt on Ink</div>
</body></html>
