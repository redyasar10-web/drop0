<!doctype html>
<html><head><meta charset="utf-8"><title>Type · mono</title>
<link rel="stylesheet" href="_card.css">
<style>
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #5C5449; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 12px; }
  .cell { border-top: 1px solid #C8C0B5; padding-top: 10px; }
  .mono { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.04em; color: #111; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #5C5449; margin-bottom: 4px; }
  .urg { color: #9B4523; }
</style></head>
<body>
  <div class="eyebrow">Operational · Söhne Mono → DM Mono</div>
  <div class="row">
    <div class="cell"><div class="lbl">Price</div><div class="mono">US$ 145.00</div></div>
    <div class="cell"><div class="lbl">SKU</div><div class="mono">1NRI‑DBT‑COF‑M</div></div>
    <div class="cell"><div class="lbl">Ships</div><div class="mono">From New York · 2–4 business days</div></div>
    <div class="cell"><div class="lbl">Duties</div><div class="mono">Paid at checkout</div></div>
    <div class="cell"><div class="lbl">Returns</div><div class="mono">Free, 14 days, US address</div></div>
    <div class="cell"><div class="lbl">Window</div><div class="mono urg">Closes Fri 02:00 ET</div></div>
  </div>
</body></html>
