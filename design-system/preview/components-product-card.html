<!doctype html>
<html><head><meta charset="utf-8"><title>Product card</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #5C5449; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
  .card { }
  .img {
    aspect-ratio: 4/5; background: linear-gradient(160deg, #d9cfbf 0%, #b8a78f 100%);
    border: 1px solid #C8C0B5; position: relative;
  }
  .img::after {
    content: ""; position: absolute; inset: 20% 30%; border: 1px solid rgba(17,17,17,0.2);
  }
  .brand { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #C9921E; margin-top: 10px; }
  .name  { font-family: var(--font-display); font-size: 18px; font-weight: 500; letter-spacing: -0.01em; color: #111; margin-top: 2px; }
  .price { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; color: #111; margin-top: 4px; }
  .meta  { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #5C5449; margin-top: 8px; }
  .urgent { color: #9B4523; }
</style></head>
<body>
  <div class="eyebrow">Product card · flat, no shadow, image is the card</div>
  <div class="grid">
    <div class="card">
      <div class="img"></div>
      <div class="brand">1Nri · Accra</div>
      <div class="name">Dry Bones Tee — Coffee Brown</div>
      <div class="price">US$ 145.00</div>
      <div class="meta">Ships from NYC · Duties paid</div>
    </div>
    <div class="card">
      <div class="img" style="background: linear-gradient(160deg, #b59a78 0%, #7d6545 100%)"></div>
      <div class="brand">Jireh · Accra</div>
      <div class="name">Dusk Before Dawn Button‑Up</div>
      <div class="price">US$ 220.00</div>
      <div class="meta urgent">3 of 30 left · closes Friday</div>
    </div>
  </div>
</body></html>
